# alembic.ini
# Alembic configuration file for iceberg-schema-drift-demo

[alembic]
# Path to migration scripts
script_location = .

# Template for migration file names
file_template = %%(rev)s_%%(slug)s

# Timezone for generated migration timestamps
timezone = UTC

# Max length of characters to apply to the "slug" field
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command
# regardless of autogenerate
revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file
sourceless = false

# Version path separator — use os.pathsep for platform-specific separator
version_path_separator = os

# The output encoding used when revision files are written from script.py.mako
output_encoding = utf-8

# Database URL — overridden at runtime by the DATABASE_URL environment variable
# Format: dialect+driver://user:password@host:port/dbname
sqlalchemy.url = postgresql+psycopg2://app:app@postgres:5432/appdb


# ─────────────────────────────────────────────────────────────
# Logging configuration
# ─────────────────────────────────────────────────────────────

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine
# Set to INFO to log SQL statements, DEBUG for full query details

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S